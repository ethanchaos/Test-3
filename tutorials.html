<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tutorial — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background-color: #ffffff;
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 52px 44px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }

    .emoji {
      font-size: 3.2rem;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-family: 'Oxanium', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: #555;
      line-height: 1.6;
    }

    .date {
      display: inline-block;
      margin-top: 18px;
      font-family: 'Oxanium', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 5px 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">👷</span>
    <h1>Website Still on Development</h1>
    <p>We're working hard to get this ready for you.</p>
    <p>It will be available next week.</p>
    <span class="date">📅 21 June 2026</span>
  </div>
</body>
</html>
