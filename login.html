<!DOCTYPE html>
<html lang="en" data-theme="white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ConfigHub &amp; Deovex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dvex.css">
    <style>
        body { padding-bottom: 40px; }

        .auth-wrap {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px 28px;
            box-shadow: var(--shadow-card), var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan), var(--accent-blue));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Fields ── */
        .field-group { margin-bottom: 16px; }

        .field-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-medium);
            margin-bottom: 7px;
            font-family: var(--font-display);
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .field-label i { color: var(--accent-cyan); font-size: .75rem; width: 14px; text-align: center; }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: .82rem;
            pointer-events: none;
            transition: var(--transition);
        }

        .input-wrap:focus-within .input-icon { color: var(--accent-cyan); }

        .pw-toggle {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: .82rem;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
            transition: var(--transition);
        }

        .pw-toggle:hover { color: var(--text-medium); }

        .auth-input {
            width: 100%;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 40px 12px 40px;
            color: var(--text-dark);
            font-size: .93rem;
            font-family: var(--font-body);
            transition: var(--transition);
            outline: none;
            -webkit-appearance: none;
        }

        .auth-input::placeholder { color: var(--text-light); font-size: .88rem; }

        .auth-input:focus {
            border-color: var(--border-active);
            background: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
        }

        /* ── Error banner ── */
        .form-msg {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: .85rem;
            margin-bottom: 18px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeIn .3s ease;
        }

        .form-msg.show { display: flex; }

        .form-msg.error {
            background: rgba(211,47,47,0.06);
            border: 1px solid rgba(211,47,47,0.22);
            color: var(--error-red);
        }

        /* ── Login button ── */
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-family: var(--font-display);
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: .06em;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
        .auth-btn:active { transform: scale(.98); }
        .auth-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        .btn-spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        .auth-btn.loading .btn-spinner { display: block; }
        .auth-btn.loading .btn-text    { display: none; }

        /* ── Footer link ── */
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: .85rem;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .auth-footer a:hover { opacity: .75; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin   { to { transform: rotate(360deg); } }

        @media (max-width: 480px) { .auth-card { padding: 24px 18px; } }
    </style>
</head>
<body>

<header id="mainHeader">
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-shield-alt"></i>
            <div class="logo-text">ConfigHub <span class="logo-amp">&amp;</span> Deovex</div>
        </a>
        <div class="nav-container">
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="index.html"><i class="fas fa-house"></i> Home</a>
                <a href="signup.html"><i class="fas fa-user-plus"></i> Sign Up</a>
                <a href="https://whatsapp.com/channel/0029VbAL2mRC6ZvhCR8jjI0G" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp Channel</a>
                <a href="https://t.me/EthanChaoss" target="_blank"><i class="fab fa-telegram"></i> Contact Dav</a>
            </div>
        </div>
    </nav>
</header>

<section class="content-section">
    <div class="auth-wrap">

        <div class="section-header">
            <h1><i class="fas fa-sign-in-alt"></i> Welcome Back</h1>
            <p>Log in to access your configurations</p>
        </div>

        <div class="auth-card">

            <div class="form-msg error" id="formError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="formErrorMsg">Invalid credentials.</span>
            </div>

            <!-- Username -->
            <div class="field-group">
                <div class="field-label"><i class="fas fa-user"></i> Username</div>
                <div class="input-wrap">
                    <i class="input-icon fas fa-at"></i>
                    <input type="text" id="username" class="auth-input"
                           placeholder="your_username"
                           autocomplete="username"
                           autocapitalize="none">
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <div class="field-label"><i class="fas fa-lock"></i> Password</div>
                <div class="input-wrap">
                    <i class="input-icon fas fa-key"></i>
                    <input type="password" id="password" class="auth-input"
                           placeholder="your password"
                           autocomplete="current-password">
                    <button class="pw-toggle" id="pwToggle" type="button" tabindex="-1" aria-label="Show password">
                        <i class="fas fa-eye" id="pwIcon"></i>
                    </button>
                </div>
            </div>

            <button class="auth-btn" id="loginBtn" type="button">
                <div class="btn-spinner"></div>
                <span class="btn-text"><i class="fas fa-sign-in-alt"></i>&nbsp; LOG IN</span>
            </button>

            <div class="auth-footer">No account? <a href="signup.html">Create one</a></div>

        </div>
    </div>
</section>

<script src="deovex-pp.js"></script>
<script src="deovex-auth.js"></script>
<script src="deovex-login.js"></script>
</body>
</html>
